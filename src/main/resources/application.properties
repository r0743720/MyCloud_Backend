# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mycloud}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fallback}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fallback}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:fallback}
jwt.expiration-ms=28800000

storage.path=${STORAGE_PATH:./uploads}

# Max file upload sizes
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB

# mqtt
mqtt.broker=${MQTT_BROKER:tcp://localhost:1883}